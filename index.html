<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKG Merkezi HUB</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* TEMA DEĞİŞKENLERİ */
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --font-size-base: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-size: var(--font-size-base);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ORTAK KART TASARIMI */
        .card {
            background: var(--bg-panel);
            width: 95%;
            max-width: 500px;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        .header-logo { text-align: center; margin-bottom: 20px; }
        .header-logo img { width: 150px; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
            color: var(--text-primary);
            font-size: 16px;
        }

        button.btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        button.btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        
        button.btn-danger { background: var(--accent-red); }
        button.btn-success { background: var(--accent-green); }
        button.btn-warning { background: var(--accent-orange); color: #000; }

        .screen { display: none; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        /* Loading Overlay */
        #loader {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999;
            display: none; align-items: center; justify-content: center; flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--accent-color);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ARIZA LİSTESİ (OP ve YÖNETİCİ) */
        .fault-item {
            background: rgba(0,0,0,0.2);
            border-left: 4px solid var(--accent-red);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .fault-item:hover { background: rgba(255,255,255,0.05); transform: scale(1.02); }
        .fault-item h3 { margin-bottom: 5px; color: var(--accent-color); }
        .fault-item p { margin-bottom: 5px; font-size: 14px; color: var(--text-secondary); }

        #qr-reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 10px; overflow: hidden; }

        /* AYARLAR VE ÇIKIŞ */
        .top-bar { width: 100%; display: flex; justify-content: space-between; padding: 15px; position: absolute; top:0; z-index: 100; }
        .top-bar button { background: none; border: none; color: var(--text-primary); font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button id="logout-btn" onclick="logout()" style="display:none;" title="Çıkış Yap">⏻</button>
        <span id="user-info" style="font-weight: bold; color: var(--accent-color);"></span>
    </div>

    <!-- LOADER -->
    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-text">Lütfen bekleyin...</p>
    </div>

    <!-- 1. GİRİŞ EKRANI -->
    <div id="screen-login" class="screen" style="display: flex; justify-content: center; height: 100vh;">
        <div class="card">
            <div class="header-logo"><img src="AKGLOG.png" alt="AKG LOGO" onerror="this.style.display='none'"></div>
            <h2 style="text-align: center; margin-bottom: 20px;">Merkezi Sisteme Giriş</h2>
            <p style="text-align: center; margin-bottom: 15px; font-size: 14px; color: var(--text-secondary);">Lütfen size tanımlanan giriş şifrenizi yazınız.</p>
            <input type="password" id="login-pass" placeholder="Şifreniz">
            <button class="btn-primary" onclick="doLogin()">Giriş Yap</button>
        </div>
    </div>

    <!-- İŞ İSTEK FORMU KALDIRILDI - SİSTEM SADECE AÇIK ARIZALARI LİSTELEYECEK -->

    <!-- 3. OPERATÖR (QR OKUTMA VE MÜDAHALE EKRANI) -->
    <div id="screen-op" class="screen">
        <div class="card" style="margin-top: 60px; text-align: center;">
            <h2 style="margin-bottom: 10px; color: var(--accent-orange);">Operatör Paneli</h2>
            <p style="margin-bottom: 20px; color: var(--text-secondary);">Müdahale edeceğiniz makinenin QR kodunu okutun.</p>
            
            <div id="qr-reader"></div>
            
            <button class="btn-primary" style="margin-top:20px;" onclick="startQRScanner()">QR Kamerayı Aç</button>
            <button class="btn-primary btn-warning" onclick="fetchOpenFaultsForOP()">Açık Arızaları Gör (Manuel Liste)</button>
        </div>

        <!-- QR Okunduktan sonra çıkan Arıza Detay Ekranı -->
        <div id="op-action-card" class="card" style="display: none;">
            <h3 id="op-makine-adi" style="color: var(--accent-color); margin-bottom: 10px;"></h3>
            <p id="op-ariza-detay" style="margin-bottom: 20px;"></p>
            
            <div id="op-start-section">
                <button class="btn-primary btn-success" onclick="startJob()">İşe Başla (Sayacı Başlat)</button>
            </div>

            <div id="op-finish-section" style="display: none;">
                <select id="op-ariza-nedeni"><option value="">Arıza Nedeni Seçin...</option></select>
                <select id="op-durus-nedeni"><option value="">Duruş Nedeni Seçin...</option></select>
                <textarea id="op-islem-notu" rows="3" placeholder="Yapılan işlemi kısaca yazınız..."></textarea>
                <button class="btn-primary btn-danger" onclick="finishJob('TAMAMLANDI')">İşi Tamamla (Kapat)</button>
                <button class="btn-primary btn-warning" onclick="finishJob('PARÇA BEKLİYOR')">Parça Bekliyor (Durdur)</button>
                <button class="btn-primary" onclick="finishJob('VARDİYA DEVRİ')">Vardiya Devri (Durdur)</button>
            </div>
        </div>
    </div>

    <!-- 4. YÖNETİCİ EKRANI -->
    <div id="screen-admin" class="screen">
        <div class="card" style="margin-top: 60px; max-width: 800px;">
            <h2 style="margin-bottom: 20px; color: var(--accent-color);">Yönetici / Bakım Paneli</h2>
            <div id="admin-faults-container"></div>
        </div>
    </div>

    <script>
        // LÜTFEN GOOGLE APPS SCRIPT YAYIN URL'NİZİ BURAYA YAPIŞTIRIN
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbS62j_dBcMUIZ2VwOLgbnzgfZwQTx3jbwqhUd8KC3y4N6EUMOh6XUf8nEa-S46B8t/exec"; 

        let currentUser = null;
        let dropdownData = null;
        let currentFaultRowIndex = null; // OP'nin üzerinde çalıştığı satır
        let targetMachineName = null; // QR ile eşleşmesi gereken makine

        // Ekran Değiştirici
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(screenId).style.display = 'flex';
            // Ekran değişince QR tarayıcıyı durdur
            if(html5Qrcode && html5Qrcode.isScanning) {
                html5Qrcode.stop().catch(err => console.log("Kamera durdurma hatası", err));
            }
        }

        // --- Kart Tıklama: QR Okuyucuya Yönlendir ---
        async function prepareMaintenance(rowIndex, makine) {
            currentFaultRowIndex = rowIndex;
            targetMachineName = makine;
            await loadOPDropdowns(); // Yönetici de tıklasa listelerin dolması için
            
            showScreen('screen-op');
            startQRScanner(); // Hiçbir seçenek sunmadan DİREKT kamerayı aç
        }

        // Loader Kontrol
        function showLoader(text) {
            document.getElementById('loader-text').innerText = text || "Yükleniyor...";
            document.getElementById('loader').style.display = 'flex';
        }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }

        // Backend İletişim (Fetch)
        async function sendToBackend(data) {
            if(SCRIPT_URL === "BURAYA_GOOGLE_SCRIPT_WEB_APP_URL_GELECEK") {
                alert("LÜTFEN İLK OLARAK GOOGLE SCRIPT URL'NİZİ KODA EKLAYIN!");
                return { success: false };
            }
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (err) {
                console.error(err);
                alert("Bağlantı hatası!");
                return { success: false };
            }
        }

        // --- 1. GİRİŞ İŞLEMİ ---
        async function doLogin() {
            const pass = document.getElementById('login-pass').value.trim();
            if(!pass) return alert("Lütfen şifrenizi girin.");

            showLoader("Kimlik doğrulanıyor...");
            const res = await sendToBackend({ action: "login", password: pass });
            
            if(res.success) {
                currentUser = res;
                document.getElementById('user-info').innerText = `${res.name} (${res.role})`;
                document.getElementById('logout-btn').style.display = 'block';
                
                // Role Göre Yönlendirme
                if(res.role === "OP" || res.role === "OPERATÖR") {
                    await loadOPDropdowns();
                    showScreen('screen-op');
                } else {
                    // Yönetici veya diğer personeller sadece açık listeyi görür
                    await loadAdminData();
                    showScreen('screen-admin');
                }
            } else {
                alert(res.message);
            }
            hideLoader();
        }

        async function loadOPDropdowns() {
            if(dropdownData) return; 
            const res = await sendToBackend({ action: "getDropdownData" });
            if(res.success) {
                dropdownData = res.data;
                populateSelect('op-ariza-nedeni', dropdownData.arizaNedeni);
                populateSelect('op-durus-nedeni', dropdownData.durusNedeni);
                // Hata ayıklama için bulunan sütunları göster (İsteğe bağlı, her girişte çıkar)
                console.log("Veri Yükleme Özeti:", res.message);
                if(res.message.includes("Eksik:")) {
                   alert("UYARI: " + res.message + "\nLütfen 'veri' sayfasındaki başlık isimlerini kontrol edin.");
                }
            } else {
                alert("Veriler yüklenemedi: " + res.message);
            }
        }

        function populateSelect(id, list) {
            const el = document.getElementById(id);
            if(!el) {
                alert("HATA: Ekranda " + id + " kutusu bulunamadı!");
                return;
            }
            if(!list || list.length === 0) {
                alert("HATA: " + id + " için gelen veri listesi boş!");
                return;
            }
            
            // İlk seçeneği sakla
            const firstOptionText = el.options.length > 0 ? el.options[0].text : "Seçiniz...";
            
            // Kutuyu tamamen temizle
            el.innerHTML = "";
            
            // İlk seçeneği geri ekle
            const defaultOpt = document.createElement('option');
            defaultOpt.value = "";
            defaultOpt.text = firstOptionText;
            el.appendChild(defaultOpt);
            
            // Gelen listeyi ekle
            list.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.text = item;
                el.appendChild(opt);
            });
        }

        function logout() {
            if(confirm("Çıkış yapmak istediğinize emin misiniz?")) {
                currentUser = null;
                document.getElementById('user-info').innerText = "";
                document.getElementById('logout-btn').style.display = 'none';
                document.getElementById('login-pass').value = "";
                showScreen('screen-login');
            }
        }

        // --- 2. FORM İŞLEMLERİ İPTAL EDİLDİ ---
        // Uygulama sadece "giris" sekmesindeki I-P'si boş olan (açık) kayıtları okumak üzerine kurgulandı.

        // --- 3. OPERATÖR (QR & LİSTE) ---
        let html5Qrcode;
        function startQRScanner() {
            document.getElementById('qr-reader').innerHTML = ""; // Temizle
            
            if(!html5Qrcode) {
                html5Qrcode = new Html5Qrcode("qr-reader");
            }

            // Doğrudan arka kamerayı (environment) başlat
            html5Qrcode.start(
                { facingMode: "environment" }, 
                {
                    fps: 10,
                    qrbox: { width: 250, height: 250 }
                },
                onScanSuccess,
                onScanError
            ).catch(err => {
                console.error("Kamera açılamadı:", err);
                alert("Kamera otomatik başlatılamadı! Lütfen tarayıcı ayarlarından kameraya İZİN VERİN veya başka bir uygulamadan açıyorsanız doğrudan Chrome'da açın.");
            });
        }

        function extractIdFromQR(qrText) {
            if(!qrText.includes("http")) return qrText.trim();
            try {
                let parts = qrText.split('row=');
                if(parts.length > 1) {
                    return parts[1].split('&')[0].trim();
                }
            } catch(e) {}
            return qrText.trim();
        }

        async function onScanSuccess(decodedText, decodedResult) {
            try {
                // QR Kod Okundu! 
                if(html5Qrcode && html5Qrcode.isScanning) {
                    await html5Qrcode.stop().catch(console.error); // Kamerayı kapat
                }
                
                showLoader("QR Eşleştiriliyor...");
                await loadOPDropdowns(); // makineMap verisinin kesinlikle yüklenmiş olmasını sağla
                
                // Okunan QR'dan ID çıkar
                let scannedId = extractIdFromQR(decodedText);
                
                // Eğer yeni sekmedeki listede bu ID varsa, GERÇEK makine adını bul
                let mappedMachineName = decodedText; // Eşleşmezse kodun kendisi kalsın
                if(dropdownData && dropdownData.makineMap && dropdownData.makineMap[scannedId]) {
                    mappedMachineName = dropdownData.makineMap[scannedId];
                }
                
                // Eğer bir karta TIKLANARAK gelinmişse
                if(targetMachineName) {
                    hideLoader();
                    // 1. İhtimal: QR'dan çözülen GİZLİ makine adı ile tıklanan makine BİREBİR EŞLEŞTİYSE
                    if(mappedMachineName.toUpperCase().includes(targetMachineName.toUpperCase()) || 
                       targetMachineName.toUpperCase().includes(mappedMachineName.toUpperCase())) {
                        
                        showOPActionCard({ rowIndex: currentFaultRowIndex, makine: targetMachineName, aciklama: "Sistem: Makine Kimliği Doğrulandı" });
                        targetMachineName = null; // Sıfırla
                    } 
                    // 2. İhtimal: Eşleşmiyorsa uyar ve onaya düşür
                    else {
                        let onayaCikanMakine = (dropdownData && dropdownData.makineMap && dropdownData.makineMap[scannedId]) ? dropdownData.makineMap[scannedId] : "Tanımsız/Farklı Sistem";
                        let onay = confirm(`DİKKAT: YANLIŞ MAKİNE!\n\nSiz listeden "${targetMachineName}" seçtiniz.\nAncak okuttuğunuz QR kod "${onayaCikanMakine}" makinesine ait.\n\nYine de zorla devam etmek (Onaylamak) istiyor musunuz?`);
                        
                        if(onay) {
                            showOPActionCard({ rowIndex: currentFaultRowIndex, makine: targetMachineName, aciklama: "Sistem uyarısına rağmen onaylandı" });
                            targetMachineName = null;
                        } else {
                            startQRScanner(); // Tekrar aç
                        }
                    }
                } else {
                    // ... (rest of the else block)
                    const res = await sendToBackend({ action: "getOpenFaults" });
                    hideLoader();

                    if(res.success) {
                        const faults = res.data;
                        const matchedFaults = faults.filter(f => 
                            mappedMachineName.toUpperCase().includes(f.makine.toUpperCase()) || 
                            f.makine.toUpperCase().includes(mappedMachineName.toUpperCase())
                        );

                        if(matchedFaults.length === 1) {
                            showOPActionCard(matchedFaults[0]);
                        } else if(matchedFaults.length > 1) {
                            let txt = `Bu makineye (${matchedFaults[0].makine}) ait ${matchedFaults.length} açık arıza var.\n\nHangisine müdahale edeceksiniz?\n\n`;
                            matchedFaults.forEach((f, idx) => {
                                txt += `${idx+1}- Arıza: ${f.aciklama} (Bildiren: ${f.talepEden})\n`;
                            });
                            let sec = prompt(`${txt}\nSeçiminiz (1 ile ${matchedFaults.length} arası bir rakam girin):`);
                            let secIdx = parseInt(sec) - 1;
                            if(sec && !isNaN(sec) && matchedFaults[secIdx]) {
                                showOPActionCard(matchedFaults[secIdx]);
                            } else {
                                alert("Geçersiz seçim yaptınız.");
                                startQRScanner();
                            }
                        } else {
                            alert(`DİKKAT: EŞLEŞME BULUNAMADI!\n\nSistem bu QR kodu "${mappedMachineName}" olarak okudu ancak bu makineye ait AÇIK BİR ARIZA yok.`);
                            startQRScanner();
                        }
                    }
                }
            } catch (err) {
                console.error(err);
                hideLoader();
                alert("QR İşleme Hatası: " + err.message + "\n\nLütfen backend kodunu güncelleyip YENİ DAĞITIM aldığınızdan emin olun!");
                startQRScanner();
            }
        }

        function onScanError(errorMessage) {
            // Sürekli okuma yaptığı için hataları loglamaya gerek yok
        }

        // Manuel Liste
        async function fetchOpenFaultsForOP() {
            showLoader("Açık Arızalar Yükleniyor...");
            const res = await sendToBackend({ action: "getOpenFaults" });
            hideLoader();
            
            if(res.success && res.data.length > 0) {
                // Basit bir prompt veya liste gösterilebilir.
                // Gerçek kullanımda ekranda div içine basılmalıdır.
                let txt = "AÇIK ARIZALAR:\n\n";
                res.data.forEach((f, idx) => {
                    txt += `${idx+1}- ${f.makine} (Arıza: ${f.aciklama})\n`;
                });
                
                let sec = prompt(`${txt}\nMüdahale etmek istediğiniz arızanın numarasını girin:`);
                if(sec && !isNaN(sec)) {
                    let fault = res.data[parseInt(sec)-1];
                    if(fault) showOPActionCard(fault);
                }
            } else {
                alert("Şu anda açık arıza bulunmamaktadır.");
            }
        }

        function showOPActionCard(fault) {
            currentFaultRowIndex = fault.rowIndex;
            document.getElementById('op-makine-adi').innerText = fault.makine;
            document.getElementById('op-ariza-detay').innerHTML = `<b>Bildiren:</b> ${fault.talepEden} <br><b>Arıza:</b> ${fault.aciklama}`;
            
            document.getElementById('op-action-card').style.display = 'block';
            document.getElementById('op-start-section').style.display = 'block';
            document.getElementById('op-finish-section').style.display = 'none';
        }

        async function startJob() {
            showLoader("İşe başlanıyor...");
            const res = await sendToBackend({ action: "startMaintenance", rowIndex: currentFaultRowIndex, operatorName: currentUser.name });
            hideLoader();
            
            if(res.success) {
                document.getElementById('op-start-section').style.display = 'none';
                document.getElementById('op-finish-section').style.display = 'block';
                alert("Sayacınız başlatıldı! İşlem bitince aşağıdaki butonlardan durumu seçin.");
            }
        }

        async function finishJob(status) {
            const not = document.getElementById('op-islem-notu').value;
            const arizaNedeni = document.getElementById('op-ariza-nedeni').value;
            const durusNedeni = document.getElementById('op-durus-nedeni').value;

            if(status === 'TAMAMLANDI' && (!not || !arizaNedeni || !durusNedeni)) {
                return alert("Lütfen Arıza Nedeni, Duruş Nedeni ve İşlem Notunu doldurunuz!");
            }

            showLoader("İşlem kaydediliyor ve süre hesaplanıyor...");
            const res = await sendToBackend({ 
                action: "finishMaintenance", 
                rowIndex: currentFaultRowIndex, 
                operatorName: currentUser.name,
                status: status,
                arizaNedeni: arizaNedeni,
                durusNedeni: durusNedeni,
                sonAciklama: not
            });
            hideLoader();

            if(res.success) {
                alert(`İşlem Başarılı!\n${res.message}`);
                document.getElementById('op-action-card').style.display = 'none';
                document.getElementById('op-islem-notu').value = "";
            }
        }

        // --- 4. AÇIK ARIZALAR LİSTESİ (YÖNETİCİ/PERSONEL EKRANI) ---
        async function loadAdminData() {
            showLoader("Açık Arızalar Çekiliyor...");
            const res = await sendToBackend({ action: "getOpenFaults" });
            hideLoader();
            
            const cont = document.getElementById('admin-faults-container');
            cont.innerHTML = "";
            
            if(res.success) {
                if(res.data.length === 0) {
                    cont.innerHTML = "<p style='text-align:center; padding:20px;'>Bekleyen açık arıza yok.</p>";
                    return;
                }
                
                // İş Türüne Göre Gruplandırma
                const grouped = res.data.reduce((acc, fault) => {
                    const tur = fault.isTuru || "Belirtilmemiş";
                    if (!acc[tur]) acc[tur] = [];
                    acc[tur].push(fault);
                    return acc;
                }, {});

                // Renk Haritası
                const typeColors = {
                    "İŞ GÜVENLİĞİ": "#ff0000",      // Kıpkırmızı
                    "ELEKTRİK": "#3b82f6",          // Mavi
                    "MEKANİK": "#facc15",           // Sarı/Gold
                    "TEKRAR EDEN ARIZA": "#a855f7",  // Mor
                    "PLANLI BAKIM": "#22c55e",      // Yeşil
                    "DİĞER": "#94a3b8"               // Gri
                };

                for (const [tur, faults] of Object.entries(grouped)) {
                    // Kısmi eşleşme kontrolü (Örn: "İŞ GÜVENLİĞİ !!!" gelirse "İŞ GÜVENLİĞİ" rengini al)
                    let color = "#38bdf8"; // Varsayılan
                    const upperTur = tur.toUpperCase();
                    
                    for (const key in typeColors) {
                        if (upperTur.includes(key)) {
                            color = typeColors[key];
                            break;
                        }
                    }
                    
                    cont.innerHTML += `<h2 style="color:${color}; margin: 25px 0 10px 0; border-bottom: 2px solid ${color}; padding-bottom:5px; text-transform: uppercase;">${tur} (${faults.length})</h2>`;
                    
                    faults.forEach(f => {
                        // Tarih formatını güzelleştirme
                        let displayDate = f.tarih;
                        try {
                            if(f.tarih && f.tarih.includes('/')) {
                                // Zaten formatlı gelmiş olabilir
                            } else if(f.tarih) {
                                displayDate = new Date(f.tarih).toLocaleString();
                                if(displayDate === "Invalid Date") displayDate = f.tarih;
                            }
                        } catch(e) { displayDate = f.tarih; }

                        cont.innerHTML += `
                            <div class="fault-item" style="border-left: 5px solid ${color}; border-right: ${upperTur.includes('!') ? '2px solid ' + color : 'none'};" onclick="prepareMaintenance(${f.rowIndex}, '${f.makine}')">
                                <h3>${f.makine}</h3>
                                <p><b>Bildiren:</b> ${f.talepEden} | <b>Tarih:</b> ${displayDate}</p>
                                <p><b>Maliyet:</b> ${f.maliyetMerkezi} | <b>İş Türü:</b> ${f.isTuru}</p>
                                <p><b>Açıklama:</b> ${f.aciklama}</p>
                                <p><b>Log:</b> <br>${f.durum ? f.durum.replace(/\n/g, '<br>') : 'Henüz işlem yok'}</p>
                            </div>
                        `;
                    });
                }
            }
        }

        // SW Kaydı
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Hatası:', err));
            });
        }
    </script>
</body>
</html>
